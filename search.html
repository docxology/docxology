    <style>
        .search-shell{max-width:1040px;margin:0 auto;padding:7rem 2rem 4rem}

<body>

    <main id="main" class="search-shell">
        <header class="section-header">
            <h1>Search</h1>
            <p>Works, software, domains, people, organizations, claims, and site metadata.</p>
            <div class="section-divider"></div>
        </header>
        <section class="search-panel" aria-label="Site search">
            <input id="q" class="search-input" type="search" autocomplete="off" placeholder="Search Active Inference, ants, Curio Cards, CEREBRUM..." autofocus>
            <div id="filters" class="search-controls" aria-label="Result type filters"></div>
        </section>
        <section class="result-list" id="results" aria-live="polite"></section>
    </main>
    <footer role="contentinfo">
        <div class="footer-rule" aria-hidden="true"></div>
        <p>Daniel Ari Friedman, PhD · <a href="search-index.json">search-index.json</a> · <a href="opensearch.xml">OpenSearch</a></p>
    </footer>
    <script src="js/search-utils.js"></script>
    <script>
        const state = { items: [], type: 'all', q: '' };
        const params = new URLSearchParams(location.search);
        const input = document.getElementById('q');
        const filters = document.getElementById('filters');
        const results = document.getElementById('results');
        input.value = params.get('q') || '';
        state.q = input.value;

        function score(item, terms){
            const title = item.title.toLowerCase();
            const content = item.content.toLowerCase();
            let value = 0;
            for (const term of terms){
                if (title.includes(term)) value += 8;
                if (content.includes(term)) value += 2;
            }
            if (item.type === 'work') value += 1;
            return value;
        }

        function renderFilters(){
            const types = ['all', ...Array.from(new Set(state.items.map(i => i.type))).sort()];
            filters.innerHTML = types.map(type => `<button type="button" class="${type === state.type ? 'active' : ''}" data-type="${esc(type)}">${esc(type)}</button>`).join('');
            filters.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
                state.type = btn.dataset.type;
                render();
            }));
        }

        function render(){
            const terms = state.q.toLowerCase().split(/\s+/).filter(Boolean);
            let matches = state.items;
            if (state.type !== 'all') matches = matches.filter(item => item.type === state.type);
            if (terms.length) matches = matches.map(item => ({item, rank: score(item, terms)})).filter(x => x.rank > 0).sort((a,b) => b.rank - a.rank).map(x => x.item);
            else matches = matches.slice(0, 40);
            matches = matches.slice(0, 80);
            results.innerHTML = matches.map(item => {
                const tags = (item.tags || []).filter(Boolean).slice(0, 5).map(tag => `<span>${esc(tag)}</span>`).join('');
                return `<article class="result-card"><h2><a href="${esc(item.url)}">${esc(item.title)}</a></h2><p>${esc(item.summary || '')}</p><div class="result-meta"><span>${esc(item.type)}</span>${item.year ? `<span>${esc(item.year)}</span>` : ''}${tags}</div></article>`;
            }).join('') || '<p class="text-center text-muted mt-2">No results.</p>';
            const url = new URL(location.href);
            if (state.q) url.searchParams.set('q', state.q); else url.searchParams.delete('q');
            history.replaceState(null, '', url);
        }

        input.addEventListener('input', () => {
            state.q = input.value;
            render();
        });

        fetch('search-index.json')
            .then(res => res.json())
            .then(data => {
                state.items = data.items || [];
                renderFilters();
                render();
            })
            .catch(() => {
                results.innerHTML = '<p class="text-center text-muted mt-2">Search index unavailable.</p>';
            });
    </script>
</body>

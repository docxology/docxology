<!-- @dsCard group="Foundations" title="Color tokens" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color tokens — danielarifriedman.com</title>
<style>
:root{color-scheme:dark;--bg-primary:#0a0908;--bg-secondary:#100e0c;--bg-card:rgba(20,18,16,0.96);--text-primary:#f4f1ea;--text-secondary:#cfc9bd;--text-muted:#9a958a;--red:#e23b2e;--red-pure:#f1463a;--gold:#e8e2d4;--silver:#b8b3a8;--border:rgba(244,241,234,0.18);--radius:3px}
body{margin:0;background:var(--bg-primary);color:var(--text-primary);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;padding:2.2rem}
h1{font-family:'Playfair Display',Georgia,serif;font-size:1.6rem;margin:0 0 1.4rem;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem}
.swatch{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chip{height:74px}
.meta{padding:.55rem .7rem;font-size:.78rem}
.meta b{display:block;color:#fff}
.meta code{color:var(--text-muted);font-size:.72rem}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head><body>
<h1>Color tokens</h1>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#0a0908"></div><div class="meta"><b>bg-primary</b><code>#0a0908</code></div></div>
  <div class="swatch"><div class="chip" style="background:#100e0c"></div><div class="meta"><b>bg-secondary</b><code>#100e0c</code></div></div>
  <div class="swatch"><div class="chip" style="background:rgba(20,18,16,0.96)"></div><div class="meta"><b>bg-card</b><code>rgba(20,18,16,.96)</code></div></div>
  <div class="swatch"><div class="chip" style="background:#f4f1ea"></div><div class="meta"><b>text-primary</b><code>#f4f1ea</code></div></div>
  <div class="swatch"><div class="chip" style="background:#cfc9bd"></div><div class="meta"><b>text-secondary</b><code>#cfc9bd</code></div></div>
  <div class="swatch"><div class="chip" style="background:#9a958a"></div><div class="meta"><b>text-muted</b><code>#9a958a</code></div></div>
  <div class="swatch"><div class="chip" style="background:#e23b2e"></div><div class="meta"><b>red</b><code>#e23b2e</code></div></div>
  <div class="swatch"><div class="chip" style="background:#f1463a"></div><div class="meta"><b>red-pure</b><code>#f1463a</code></div></div>
  <div class="swatch"><div class="chip" style="background:#e8e2d4"></div><div class="meta"><b>gold</b><code>#e8e2d4</code></div></div>
  <div class="swatch"><div class="chip" style="background:#b8b3a8"></div><div class="meta"><b>silver</b><code>#b8b3a8</code></div></div>
  <div class="swatch"><div class="chip" style="background:rgba(244,241,234,0.18)"></div><div class="meta"><b>border</b><code>rgba(244,241,234,.18)</code></div></div>
</div>
</body></html>

# Template-format manuscript configuration for docxology.
# Scaffolded from the project README/AGENTS context; update before publication.

paper:
  title: "docxology: Research, Software, and Citation Index"
  subtitle: "A manuscript scaffold for a public scholarly profile and evidence catalog"
  version: "0.1.0"
  date: ""

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  doi: ""
  version_doi: ""
  version_record: ""
  github_repository: "docxology/docxology"
  year: "2026"
  transmission_bookends:
    enabled: false
    max_prior_releases: 5
    show_steganography: false

keywords:
  - "research index"
  - "software catalog"
  - "bibliography"
  - "profile repository"
  - "evidence catalog"

metadata:
  license: "TBD"
  language: "en"

manuscript_dir: "manuscript"

render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: false
    epub: false

bibliography:
  references_path: "manuscript/references.bib"
  fail_on_missing: true
  fail_on_unused: false

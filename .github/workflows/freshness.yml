name: Public-source freshness

on:
  workflow_dispatch:
  schedule:
    - cron: "23 14 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: public-source-freshness
  cancel-in-progress: true

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh public-source snapshot
        run: python3 code/orchestrators/refresh_public_sources.py --output reports/public_source_snapshot_latest.json

      - name: Compare with checked-in snapshot
        id: diff
        run: |
          if cmp -s reports/public_source_snapshot_2026-05-13.json reports/public_source_snapshot_latest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload freshness artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-source-snapshot-latest
          path: reports/public_source_snapshot_latest.json

      - name: Open drift issue
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Public-source freshness drift detected" \
            --label "evidence,verification" \
            --body "The scheduled public-source snapshot differs from the checked-in 2026-05-13 baseline. Review the uploaded workflow artifact, then update curated claims deliberately if the scope and source quality justify it."

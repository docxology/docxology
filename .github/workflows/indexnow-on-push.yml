# Submit index-priority URLs to IndexNow (Bing, Yandex, Naver) after HTML/sitemap changes on main.
name: IndexNow
on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "sitemap.xml"
      - "a3f7c1b8d4e9426b8f2c5a7d9e3f1b6c.txt"
      - "code/orchestrators/indexnow_urls.py"
      - "code/orchestrators/submit_indexnow.py"
      - "code/src/sitemap_policy.py"

permissions:
  contents: read

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Submit URLs to IndexNow
        run: python3 code/orchestrators/submit_indexnow.py

# Submits sitemap URLs to IndexNow (Bing, Yandex, Naver) after HTML sitemap/SEO changes on main.
name: IndexNow
on:
  push:
    branches: [main]
    paths:
      - "**.html"
      - "sitemap.xml"
      - "a3f7c1b8d4e9426b8f2c5a7d9e3f1b6c.txt"

permissions:
  contents: read

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit URLs to IndexNow
        env:
          KEY_FILE: a3f7c1b8d4e9426b8f2c5a7d9e3f1b6c.txt
        run: |
          set -e
          KEY=$(tr -d ' \n\r' < "$KEY_FILE")
          test -n "$KEY"
          while IFS= read -r u; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://api.indexnow.org/indexnow?url=${u}&key=${KEY}" || echo "000")
            echo "$code  $u"
          done < <(grep '<loc>' sitemap.xml | sed 's|.*<loc>||;s|</loc>.*||')

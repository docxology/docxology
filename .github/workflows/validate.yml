name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.6

      - name: Validate generated docs and structured data
        run: python3 code/orchestrators/validate_repo.py

      - name: Run tests
        working-directory: code/tests
        run: uv run pytest -q

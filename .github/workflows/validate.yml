name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so build_sitemap.py can derive per-URL <lastmod> from
          # git commit dates reproducibly (shallow checkout yields the single
          # fetched commit's date for every file → "Stale generated sitemap.xml").
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.6

      - name: Validate generated docs and structured data
        run: uv run python3 code/orchestrators/validate_repo.py

      - name: Run tests
        run: uv run pytest code/tests -q
